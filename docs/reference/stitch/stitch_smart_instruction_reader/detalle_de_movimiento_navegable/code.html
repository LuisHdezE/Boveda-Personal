<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-secondary dark:text-secondary tracking-tight">Detalle</h1>

</header>
<main class="flex-grow px-container-padding py-stack-lg max-w-lg mx-auto w-full">
<!-- Importe y Categoría (Hero Section) -->

<div class="w-16 h-16 rounded-full bg-error-container/20 flex items-center justify-center mb-stack-md shadow-[0_0_20px_rgba(255,180,171,0.1)] border border-error/20">

<h2 class="font-display-lg text-display-lg text-error tracking-tight mb-stack-sm">-$85.50</h2>
<p class="font-title-lg text-title-lg text-on-surface-variant">Cena Restaurante</p>
</div>
<!-- Tarjeta de Detalles (Glassmorphism) -->
<div class="bg-white/5 backdrop-blur-xl rounded-xl border border-white/10 p-stack-md mb-stack-lg shadow-lg">
<div class="space-y-stack-md">
<!-- Detalle: Fecha y Hora -->
<div class="flex justify-between items-center py-base border-b border-white/5 last:border-0">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant text-xl">calendar_today</span>
<span class="font-body-lg text-body-lg text-on-surface-variant">Fecha</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">24 Oct 2023, 20:30</span>
</div>
<!-- Detalle: Categoría -->
<div class="flex justify-between items-center py-base border-b border-white/5 last:border-0">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant text-xl">category</span>
<span class="font-body-lg text-body-lg text-on-surface-variant">Categoría</span>
</div>
<div class="px-3 py-1 bg-surface-container-high rounded-full border border-white/10">
<span class="font-label-md text-label-md text-on-surface">Alimentación</span>
</div>
</div>
<!-- Detalle: Moneda / Tipo de Cambio -->
<div class="flex justify-between items-center py-base border-b border-white/5 last:border-0">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant text-xl">payments</span>
<span class="font-body-lg text-body-lg text-on-surface-variant">Moneda</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface">USD (Tipo 1.0)</span>
</div>
<!-- Detalle: Nota -->

<span class="material-symbols-outlined text-on-surface-variant text-xl">notes</span>

</div>
<span class="font-body-lg text-body-lg text-on-surface text-right max-w-[60%]">Cena de negocios con cliente potencial.</span>
</div>
</div>
</div>
