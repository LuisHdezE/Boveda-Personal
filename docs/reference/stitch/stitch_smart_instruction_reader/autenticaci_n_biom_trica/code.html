<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        @keyframes scan-line {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .animate-scan {
            animation: scan-line 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .animate-pulse-ring {
            animation: pulse-ring 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen overflow-hidden selection:bg-secondary/30">
<!-- Background Layer with Simulated Blur -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute inset-0 bg-cover bg-center filter blur-xl scale-110 opacity-30" data-alt="A highly detailed, professional login screen for a premium financial vault application. The scene features deep obsidian blacks and subtle metallic gold accents. It is heavily blurred out of focus, creating a deep depth of field effect. The mood is secure, private, and luxurious, adhering strictly to a high-end dark mode minimalist aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA5KGFgOmq1844J94Rd64am7YzDynbx1abURDEm9ePSAFXBIhwezjJb__n7PVzF3QpSC8jJV2pLOEEXVUPZW7MOIepRXyP2AASuhnIWf8MgoyVHy8AXLwijqkM6zGxNpOodszggm51vnFPO7earqS4kLlSOlKwvLTwp6_PuAiq8XnAxDWMI1ej3Yx6xpe8Wdh4yWXVQfgD-IkxCTmmwPfQOArv9i_vu5vL9d0y5xsiI2hNKO1TXq_cJ73CJ_roapPGAk1TPvV4OSi0')"></div>
<!-- Gradient Overlay for Contrast -->
<div class="absolute inset-0 bg-gradient-to-t from-background via-background/90 to-background/60 backdrop-blur-sm"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen p-container-padding">
<!-- Biometric Scanner Element -->
<div class="relative flex items-center justify-center w-64 h-64 mb-stack-lg">
<!-- Outer decorative rings -->
<div class="absolute inset-0 rounded-full border border-secondary/10 animate-pulse-ring"></div>
<div class="absolute inset-8 rounded-full border border-secondary/20 animate-[spin_10s_linear_infinite] border-t-secondary/50 border-r-transparent"></div>
<div class="absolute inset-12 rounded-full border border-white/5"></div>
<!-- Central Glassmorphism Hub -->
<div class="relative flex items-center justify-center w-28 h-28 rounded-full bg-surface-container-lowest/40 backdrop-blur-2xl border border-white/10 shadow-[0_0_40px_rgba(233,195,73,0.1)] overflow-hidden">
<!-- Icon -->
<span class="material-symbols-outlined text-[56px] text-secondary relative z-10 drop-shadow-[0_0_10px_rgba(233,195,73,0.5)]" style="font-variation-settings: 'FILL' 0, 'wght' 200;">fingerprint</span>
<!-- Scanning Laser Line -->
<div class="absolute left-0 w-full h-1 bg-gradient-to-r from-transparent via-secondary to-transparent blur-[1px] animate-scan z-20 shadow-[0_0_15px_#e9c349]"></div>
</div>
</div>
<!-- Status Text -->
<div class="flex flex-col items-center gap-stack-sm animate-pulse text-center">
<h1 class="font-title-lg text-title-lg text-on-surface tracking-wide">Autenticando...</h1>
<p class="font-body-md text-body-md text-on-surface-variant/70">Mantén tu dispositivo estable</p>
</div>
<!-- Secondary Action (Password Fallback) -->
<div class="absolute bottom-12 w-full flex justify-center px-container-padding">
<button class="group relative flex items-center gap-2 px-6 py-3 rounded-full bg-surface-variant/30 hover:bg-surface-variant/60 border border-white/5 hover:border-white/10 backdrop-blur-md transition-all duration-300">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant group-hover:text-secondary transition-colors" style="font-variation-settings: 'FILL' 0, 'wght' 300;">password</span>
<span class="font-label-lg text-label-lg text-on-surface-variant group-hover:text-on-surface transition-colors">Usar Contraseña</span>
</button>
</div>
</main>
</body></html>
