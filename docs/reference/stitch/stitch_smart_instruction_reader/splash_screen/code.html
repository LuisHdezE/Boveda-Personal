<style>
        .animate-fade-in-up {
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .animate-pulse-slow {
            animation: pulseSlow 3s infinite alternate cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseSlow {
            0% {
                transform: scale(0.98);
                opacity: 0.8;
                box-shadow: 0 0 0 0 rgba(233, 195, 73, 0.1);
            }
            100% {
                transform: scale(1.02);
                opacity: 1;
                box-shadow: 0 0 40px 10px rgba(233, 195, 73, 0.2);
            }
        }

        .glass-glow {
            background: radial-gradient(circle at center, rgba(233, 195, 73, 0.15) 0%, transparent 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#0a0a0a] text-on-surface min-h-screen flex items-center justify-center overflow-hidden font-body-md">
<!-- Atmospheric Background Glow -->
<div class="absolute inset-0 z-0 flex items-center justify-center opacity-40 pointer-events-none">
<div class="w-96 h-96 rounded-full glass-glow animate-pulse-slow filter blur-3xl"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center p-container-padding w-full max-w-md mx-auto h-screen">
<!-- Central Vault Icon Container -->
<div class="animate-fade-in-up mb-stack-lg flex flex-col items-center" style="animation-delay: 0.2s;">
<!-- Outer Ring -->
<div class="relative w-32 h-32 rounded-full border border-white/5 bg-surface-container-low/30 backdrop-blur-xl flex items-center justify-center shadow-[0_0_30px_rgba(233,195,73,0.1)]">
<!-- Inner Ring / Glow -->
<div class="absolute inset-2 rounded-full border border-secondary/20 flex items-center justify-center bg-gradient-to-b from-secondary/5 to-transparent">
<span class="material-symbols-outlined text-[64px] text-secondary" style="font-variation-settings: 'FILL' 0, 'wght' 200;">
                        lock
                    </span>
</div>
</div>
</div>
<!-- Typography Section -->
<div class="animate-fade-in-up text-center flex flex-col items-center gap-stack-sm" style="animation-delay: 0.4s;">
<h1 class="font-display-lg text-display-lg text-secondary tracking-tight md:font-display-lg md:text-display-lg font-headline-lg-mobile text-headline-lg-mobile">
                Bóveda Personal
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant opacity-80 mt-stack-md max-w-[250px]">
                Secure. Private. Essential.
            </p>
</div>
<!-- Decorative Loading/Transition Line -->
<div class="animate-fade-in-up absolute bottom-24 w-48 h-[1px] bg-white/5 overflow-hidden" style="animation-delay: 0.8s;">
<div class="h-full bg-secondary w-1/3 rounded-full animate-[translateX_2s_ease-in-out_infinite]" style="animation: loadingSlide 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;"></div>
</div>
</main>
<style>
        @keyframes loadingSlide {
            0% { transform: translateX(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(300%); opacity: 0; }
        }
    </style>
<script>
        // Simple automatic transition logic for splash screens
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                // Fade out body content
                document.body.style.transition = 'opacity 0.8s ease-out';
                document.body.style.opacity = '0';
                
                // Typically you would redirect here:
                // window.location.href = '/dashboard';
            }, 3500); // Wait 3.5 seconds before starting transition
        });
    </script>
</body></html>
