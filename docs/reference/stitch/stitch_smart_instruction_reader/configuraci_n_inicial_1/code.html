<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bóveda Personal - Configuración Inicial</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#8e9192",
                        "error": "#ffb4ab",
                        "primary": "#c9c6c5",
                        "on-primary-fixed": "#1c1b1b",
                        "inverse-surface": "#d9e3f6",
                        "surface-container-highest": "#2b3544",
                        "error-container": "#93000a",
                        "on-secondary-container": "#342800",
                        "surface-tint": "#c9c6c5",
                        "secondary-fixed-dim": "#e9c349",
                        "on-secondary": "#3c2f00",
                        "on-primary-fixed-variant": "#474646",
                        "on-error": "#690005",
                        "surface-bright": "#303a48",
                        "primary-container": "#0a0a0a",
                        "primary-fixed-dim": "#c9c6c5",
                        "surface-dim": "#091421",
                        "on-surface": "#d9e3f6",
                        "inverse-on-surface": "#27313f",
                        "on-tertiary-fixed-variant": "#005236",
                        "surface-container-high": "#212b39",
                        "on-background": "#d9e3f6",
                        "on-tertiary-fixed": "#002113",
                        "tertiary-container": "#000d06",
                        "tertiary-fixed": "#6ffbbe",
                        "background": "#091421",
                        "outline-variant": "#444748",
                        "tertiary": "#4edea3",
                        "on-primary-container": "#7b7979",
                        "on-secondary-fixed-variant": "#574500",
                        "surface-container-low": "#121c2a",
                        "on-tertiary": "#003824",
                        "inverse-primary": "#5f5e5e",
                        "on-surface-variant": "#c4c7c7",
                        "on-primary": "#313030",
                        "secondary": "#e9c349",
                        "surface": "#091421",
                        "surface-container-lowest": "#050f1c",
                        "surface-container": "#16202e",
                        "secondary-fixed": "#ffe088",
                        "tertiary-fixed-dim": "#4edea3",
                        "secondary-container": "#af8d11",
                        "primary-fixed": "#e5e2e1",
                        "surface-variant": "#2b3544",
                        "on-secondary-fixed": "#241a00",
                        "on-tertiary-container": "#008b5f",
                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "stack-md": "12px",
                        "stack-sm": "4px",
                        "stack-lg": "24px",
                        "container-padding": "20px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "label-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "title-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400"}],
                        "display-lg": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "0", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "500"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}]
                    }
                }
            }
        }

<style>
        /* Custom Glassmorphism Input Focus Override to handle autofill and deep bg integration */
        input:focus ~ .icon-focus-target {
            color: theme('colors.secondary');
        }
        
        /* Hide scrollbar for clean mobile look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Subtle Background Ambient Glow -->
<div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-md h-96 bg-secondary/5 blur-[120px] rounded-full pointer-events-none -z-10"></div>
<!-- Onboarding Header (No Navigation Shell) -->
<header class="px-container-padding pt-12 pb-6 flex flex-col gap-2 relative z-10">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<span class="font-label-lg text-label-lg text-secondary tracking-widest uppercase opacity-80">Bóveda Personal</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Configuración Inicial</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Establece tus credenciales y saldos iniciales para comenzar.</p>
</header>
<!-- Main Content Area -->
<main class="flex-1 px-container-padding pb-32 flex flex-col gap-stack-lg z-10">
<!-- Section 1: Identidad -->
<section class="bg-white/[0.04] backdrop-blur-[20px] border border-white/[0.08] rounded-xl p-5 flex flex-col gap-stack-md relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-surface-variant/50"></div>
<h2 class="font-title-lg text-title-lg text-on-surface mb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-outline-variant text-sm">badge</span> Identidad
            </h2>
<!-- Input: Nombre -->
<div class="flex flex-col gap-stack-sm group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors" for="name">Nombre Completo</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant icon-focus-target transition-colors">person</span>
<input class="w-full bg-white/[0.08] border border-white/[0.1] rounded-lg py-3 pl-10 pr-4 text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all font-body-lg text-body-lg placeholder:text-outline-variant/50" id="name" placeholder="Ej. Juan Pérez" type="text"/>
</div>
</div>
<!-- Input: Username -->
<div class="flex flex-col gap-stack-sm group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors" for="username">Nombre de Usuario</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant icon-focus-target transition-colors">alternate_email</span>
<input class="w-full bg-white/[0.08] border border-white/[0.1] rounded-lg py-3 pl-10 pr-4 text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all font-body-lg text-body-lg placeholder:text-outline-variant/50" id="username" placeholder="usuario123" type="text"/>
</div>
</div>
<!-- Input: Password -->
<div class="flex flex-col gap-stack-sm group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors" for="password">Contraseña Maestra</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant icon-focus-target transition-colors">lock</span>
<input class="w-full bg-white/[0.08] border border-white/[0.1] rounded-lg py-3 pl-10 pr-12 text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all font-body-lg text-body-lg placeholder:text-outline-variant/50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</section>
<!-- Section 2: Configuración Financiera -->
<section class="bg-white/[0.04] backdrop-blur-[20px] border border-white/[0.08] rounded-xl p-5 flex flex-col gap-stack-md relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-surface-variant/50"></div>
<h2 class="font-title-lg text-title-lg text-on-surface mb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-outline-variant text-sm">settings</span> Preferencias
            </h2>
<!-- Segmented Control: Moneda Principal -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant">Moneda Principal</label>
<div class="flex bg-white/[0.06] border border-white/[0.05] rounded-lg p-1">
<button class="flex-1 bg-secondary text-on-secondary rounded-md py-2.5 font-label-lg text-label-lg transition-all shadow-sm flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">attach_money</span> USD
                    </button>
<button class="flex-1 text-on-surface-variant hover:text-on-surface hover:bg-white/[0.05] rounded-md py-2.5 font-label-lg text-label-lg transition-all flex items-center justify-center gap-2" type="button">
                         ARS
                    </button>
</div>
</div>
<!-- Input: Tasa Dólar -->
<div class="flex flex-col gap-stack-sm group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors" for="rate">Tasa de Cambio Inicial (USD a ARS)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant icon-focus-target transition-colors">currency_exchange</span>
<input class="w-full bg-white/[0.08] border border-white/[0.1] rounded-lg py-3 pl-10 pr-4 text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all font-body-lg text-body-lg placeholder:text-outline-variant/50" id="rate" placeholder="Ej. 1050.50" step="0.01" type="number"/>
</div>
</div>
</section>
<!-- Section 3: Saldos Iniciales -->
<section class="bg-white/[0.04] backdrop-blur-[20px] border border-white/[0.08] rounded-xl p-5 flex flex-col gap-stack-md relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-secondary/30"></div>
<h2 class="font-title-lg text-title-lg text-on-surface mb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">account_balance</span> Saldos Iniciales
            </h2>
<!-- Input: Saldo USD -->
<div class="flex flex-col gap-stack-sm group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors" for="balance_usd">Saldo Inicial (USD)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-lg text-body-lg">$</span>
<input class="w-full bg-white/[0.08] border border-white/[0.1] rounded-lg py-3 pl-8 pr-4 text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all font-body-lg text-body-lg text-right placeholder:text-outline-variant/50" id="balance_usd" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<!-- Input: Saldo ARS -->
<div class="flex flex-col gap-stack-sm group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-secondary transition-colors" for="balance_ars">Saldo Inicial (ARS)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-lg text-body-lg">$</span>
<input class="w-full bg-white/[0.08] border border-white/[0.1] rounded-lg py-3 pl-8 pr-4 text-on-surface focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary transition-all font-body-lg text-body-lg text-right placeholder:text-outline-variant/50" id="balance_ars" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-container-padding bg-background/80 backdrop-blur-xl border-t border-white/5 z-50">
<button class="w-full bg-secondary text-on-secondary font-label-lg text-label-lg py-4 rounded-xl shadow-[0_4px_20px_rgba(233,195,73,0.15)] active:scale-[0.98] transition-transform flex items-center justify-center gap-2 font-bold tracking-wide" type="button">
            Finalizar <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
</body></html>
