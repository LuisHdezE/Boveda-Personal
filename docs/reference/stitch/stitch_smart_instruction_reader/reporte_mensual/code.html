<!DOCTYPE html>

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chart-area {
            background: linear-gradient(180deg, rgba(233, 195, 73, 0.2) 0%, rgba(233, 195, 73, 0) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface w-full top-0 sticky z-50 flex items-center justify-between px-container-padding h-16 border-b border-white/5 shadow-sm">
<button class="text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-title-lg text-title-lg text-secondary tracking-tight">Reporte Mensual</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-padding py-stack-lg flex flex-col gap-stack-lg max-w-md mx-auto w-full">
<!-- Month Selector -->
<section class="flex justify-between items-center bg-surface-container-low rounded-lg p-2 border border-white/5">
<button class="p-2 text-on-surface-variant hover:text-secondary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="chevron_left">chevron_left</span>
</button>
<span class="font-label-lg text-label-lg text-on-surface">Octubre 2023</span>
<button class="p-2 text-on-surface-variant hover:text-secondary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="chevron_right">chevron_right</span>
</button>
</section>
<!-- Chart Section -->
<section class="glass-panel rounded-xl p-4 flex flex-col gap-stack-md">
<h2 class="font-label-lg text-label-lg text-on-surface-variant">Evolución Mensual</h2>
<div class="h-48 relative w-full overflow-hidden rounded-lg">
<!-- SVG Chart Mockup -->
<svg class="w-full h-full preserve-aspect-ratio-none" viewbox="0 0 400 200">
<!-- Grid Lines -->
<line stroke="rgba(255,255,255,0.05)" stroke-width="1" x1="0" x2="400" y1="50" y2="50"></line>
<line stroke="rgba(255,255,255,0.05)" stroke-width="1" x1="0" x2="400" y1="100" y2="100"></line>
</svg></div></section></main></body></html>
