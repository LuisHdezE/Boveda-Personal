<style>
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased pb-24">
<!-- Background Atmospheric Effect -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute top-0 right-0 w-96 h-96 bg-secondary/5 rounded-full blur-[100px] -translate-y-1/2 translate-x-1/2"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-tertiary/5 rounded-full blur-[100px] translate-y-1/2 -translate-x-1/2"></div>
</div>
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface dark:bg-surface flex items-center justify-between px-container-padding h-16 z-20">
<button class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full transition-colors active:scale-95 duration-200" onclick="window.location.href='{{DATA:SCREEN:SCREEN_21}}'">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-secondary tracking-tight">Nuevo Movimiento</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-padding pt-stack-lg z-10 w-full max-w-md mx-auto flex flex-col gap-stack-lg relative">
<!-- Transaction Type Toggle -->
<div class="flex p-1 glass-panel rounded-xl w-full">
<button class="flex-1 py-3 text-center rounded-lg font-label-lg text-label-lg transition-all duration-300 segmented-btn-active-expense" id="btn-expense" onclick="setTransactionType('expense')">
                Gasto
            </button>
<button class="flex-1 py-3 text-center rounded-lg font-label-lg text-label-lg text-on-surface-variant transition-all duration-300 hover:bg-surface-container-high" id="btn-income" onclick="setTransactionType('income')">
                Ingreso
            </button>
</div>
<!-- Numeric Input Amount -->
<div class="flex flex-col items-center justify-center py-stack-lg">
<div class="flex items-baseline gap-2">
<span class="font-headline-lg text-headline-lg text-on-surface-variant" id="currency-symbol">$</span>
<input class="bg-transparent border-none text-center font-display-lg text-display-lg text-on-background focus:ring-0 p-0 w-full max-w-[200px]" placeholder="0.00" step="0.01" type="number" value="0.00"/>
</div>
<!-- Currency Selector Chip -->
<button class="mt-stack-md flex items-center gap-1 bg-surface-container px-4 py-2 rounded-full border border-outline-variant/30 hover:bg-surface-container-high transition-colors">
<span class="font-label-md text-label-md text-secondary">USD</span>
<span class="material-symbols-outlined text-[16px] text-secondary" data-icon="arrow_drop_down">arrow_drop_down</span>
</button>
</div>
<!-- Form Details -->
<div class="flex flex-col gap-stack-md">
<!-- Category -->
<div class="glass-panel rounded-xl p-4 flex items-center justify-between cursor-pointer hover:bg-white/[0.06] transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="category">category</span>
</div>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant">Categoría</span>
<span class="font-body-lg text-body-lg text-on-background">Seleccionar...</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Date -->
<div class="glass-panel rounded-xl p-4 flex items-center justify-between cursor-pointer hover:bg-white/[0.06] transition-colors">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="calendar_today">calendar_today</span>
</div>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant">Fecha</span>
<span class="font-body-lg text-body-lg text-on-background">Hoy, 24 Oct</span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="edit">edit</span>
</div>
<!-- Note/Description -->

<label class="font-label-md text-label-md text-on-surface-variant mb-1 transition-colors" for="note">Nota (Opcional)</label>
<input class="bg-transparent border-none text-on-background font-body-lg text-body-lg focus:ring-0 p-0 w-full placeholder:text-on-surface-variant/50" id="note" placeholder="¿En qué gastaste?" type="text"/>
</div>
</div>

<button class="w-full max-w-md py-4 rounded-xl font-label-lg text-label-lg bg-secondary text-[#000000] shadow-[0_8px_24px_rgba(233,195,73,0.15)] active:scale-95 transition-transform duration-200" onclick="window.location.href='{{DATA:SCREEN:SCREEN_21}}'">
            Guardar Movimiento
        </button>
</div>
<!-- Note: Suppressed BottomNavBar as this is a transactional 'create' screen -->
<script>
        function setTransactionType(type) {
            const btnExpense = document.getElementById('btn-expense');
            const btnIncome = document.getElementById('btn-income');
            
            if (type === 'expense') {
                btnExpense.className = "flex-1 py-3 text-center rounded-lg font-label-lg text-label-lg transition-all duration-300 segmented-btn-active-expense";
                btnIncome.className = "flex-1 py-3 text-center rounded-lg font-label-lg text-label-lg text-on-surface-variant transition-all duration-300 hover:bg-surface-container-high";
            } else {
                btnIncome.className = "flex-1 py-3 text-center rounded-lg font-label-lg text-label-lg transition-all duration-300 segmented-btn-active-income";
                btnExpense.className = "flex-1 py-3 text-center rounded-lg font-label-lg text-label-lg text-on-surface-variant transition-all duration-300 hover:bg-surface-container-high";
            }
        }
    </script>
