<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Custom Keyframe Animations for Splash Screen */
        @keyframes fadeUpIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes scalePop {
            0% { opacity: 0; transform: scale(0.8); }
            70% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(233, 195, 73, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(233, 195, 73, 0); }
            100% { box-shadow: 0 0 0 0 rgba(233, 195, 73, 0); }
        }

        .animate-fade-up {
            animation: fadeUpIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        
        .animate-scale-pop {
            animation: scalePop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        
        .pulse-ring {
            animation: pulseGlow 2s infinite cubic-bezier(0.66, 0, 0, 1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col antialiased relative overflow-hidden">
<!-- Ambient Background Glow -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
<div class="w-[80vw] h-[80vw] max-w-[500px] max-h-[500px] bg-secondary/5 rounded-full blur-[80px]"></div>
</div>
<!-- Main Content Canvas (No Nav Shell per rules for Transactional/Success screens) -->
<main class="flex-1 flex flex-col items-center justify-center px-container-padding z-10 w-full max-w-md mx-auto">
<!-- Success Icon Container (Glassmorphic) -->
<div class="mb-stack-lg animate-scale-pop">
<div class="w-32 h-32 rounded-full bg-white/[0.04] backdrop-blur-xl border border-white/10 flex items-center justify-center pulse-ring shadow-[0_0_30px_rgba(233,195,73,0.15)] relative">
<!-- Inner subtle glow -->
<div class="absolute inset-0 rounded-full bg-gradient-to-tr from-secondary/10 to-transparent pointer-events-none"></div>
<span class="material-symbols-outlined text-secondary text-[64px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Typography Stack -->
<div class="flex flex-col items-center text-center mb-12">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-stack-sm animate-fade-up delay-100">
                Seguridad Reforzada
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] animate-fade-up delay-200">
                Tu Bóveda Personal ahora está protegida con biometría
            </p>
</div>
<!-- Primary Action Button -->
<div class="w-full animate-fade-up delay-300">
<button class="w-full bg-secondary text-on-secondary font-label-lg text-label-lg py-4 rounded-xl flex items-center justify-center hover:bg-secondary-fixed transition-colors active:scale-95 shadow-[0_4px_20px_rgba(233,195,73,0.2)] font-medium" type="button">
                Continuar
            </button>
</div>
</main>
