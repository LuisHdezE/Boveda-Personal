<body class="text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface dark:bg-surface flex items-center justify-between px-container-padding h-16 z-50">
<button class="text-secondary dark:text-secondary hover:bg-surface-container-high dark:hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-secondary dark:text-secondary tracking-tight">Bóveda Personal</h1>
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden">
<img alt="User Profile" class="object-cover w-full h-full" data-alt="A macro shot of a sleek, dark metallic vault dial with subtle gold accents, illuminated by dramatic side lighting that highlights the brushed texture of the metal, creating a sense of luxury and impenetrable security." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC67w290SnfG_xMAI6zXclCScF-lRJW_TUIyDjcpTFMw7QtNzv9EE6B38ptR8Do7OvPPy7EzOqW8uJ8upN9XygSf8selFnZhcoOy4_YgX7pkWqxeOY0QnBZW-CBv3mML74Vme55hijAtfAUCvP4VCFIVG6JgNz3dev7vK81stcOVx4sEU8xImzkgW7qDN846vwUDKFGVar-nzvQ95Dm4q0fp33pG-qqrXx6E08ImGls1c2Sxq4W_9jZbG-iVuyqxRBokKNU0C_eHzE"/>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-container-padding py-stack-lg flex flex-col max-w-md mx-auto w-full">
<div class="mb-stack-lg text-center">
<span class="material-symbols-outlined text-4xl text-secondary mb-stack-sm" data-icon="lock_reset" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
<h2 class="font-title-lg text-title-lg text-on-surface mb-stack-sm">Cambio de Contraseña</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Asegura tu bóveda con una contraseña fuerte y única.</p>
</div>
<form class="flex flex-col gap-stack-lg">
<!-- Card: Formulario -->
<div class="glass-panel rounded-xl p-stack-md flex flex-col gap-stack-md">
<!-- Input: Current Password -->
<div class="relative bg-white/5 rounded-t-lg border-b border-white/10 input-glow transition-colors duration-200">
<label class="block px-4 pt-2 font-label-md text-label-md text-on-surface-variant transition-colors duration-200" for="current_password">Contraseña Actual</label>
<div class="flex items-center px-4 pb-2">
<input class="w-full bg-transparent border-none p-0 text-on-surface font-body-lg focus:ring-0 placeholder-on-surface-variant/50" id="current_password" placeholder="••••••••" type="password"/>
<button class="text-on-surface-variant hover:text-secondary ml-2" type="button">
<span class="material-symbols-outlined text-sm" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<div class="h-px bg-white/5 w-full"></div> <!-- Divider -->
<!-- Input: New Password -->
<div class="relative bg-white/5 rounded-t-lg border-b border-white/10 input-glow transition-colors duration-200">
<label class="block px-4 pt-2 font-label-md text-label-md text-on-surface-variant transition-colors duration-200" for="new_password">Nueva Contraseña</label>
<div class="flex items-center px-4 pb-2">
<input class="w-full bg-transparent border-none p-0 text-on-surface font-body-lg focus:ring-0 placeholder-on-surface-variant/50" id="new_password" placeholder="Mínimo 8 caracteres" type="password"/>
<button class="text-on-surface-variant hover:text-secondary ml-2" type="button">
<span class="material-symbols-outlined text-sm" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Password Requirements Checklist -->
<div class="px-2 py-stack-sm flex flex-col gap-stack-sm">
<div class="flex items-center gap-2 text-tertiary-fixed-dim">
<span class="material-symbols-outlined text-[16px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-md text-label-md">Mínimo 8 caracteres</span>
</div>
<div class="flex items-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="radio_button_unchecked">radio_button_unchecked</span>
<span class="font-label-md text-label-md">Un número o símbolo</span>
</div>
</div>
<div class="h-px bg-white/5 w-full"></div> <!-- Divider -->
<!-- Input: Confirm Password -->
<div class="relative bg-white/5 rounded-t-lg border-b border-white/10 input-glow transition-colors duration-200">
<label class="block px-4 pt-2 font-label-md text-label-md text-on-surface-variant transition-colors duration-200" for="confirm_password">Confirmar Nueva Contraseña</label>
<div class="flex items-center px-4 pb-2">
<input class="w-full bg-transparent border-none p-0 text-on-surface font-body-lg focus:ring-0 placeholder-on-surface-variant/50" id="confirm_password" placeholder="Repite tu nueva contraseña" type="password"/>
<button class="text-on-surface-variant hover:text-secondary ml-2" type="button">
<span class="material-symbols-outlined text-sm" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-secondary text-on-secondary-fixed font-label-lg text-label-lg py-4 rounded-xl shadow-[0_4px_20px_rgba(233,195,73,0.15)] active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2 mt-stack-md" type="submit">
<span class="material-symbols-outlined" data-icon="save">save</span>
                Actualizar Contraseña
            </button>
</form>
</main>
<!-- Suppressed BottomNavBar: Task-Focused Screen -->
<script>
        // Simple script to toggle password visibility
        document.querySelectorAll('button[type="button"]').forEach(button => {
            button.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('.material-symbols-outlined');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility_off';
                }
            });
        });
    </script>
