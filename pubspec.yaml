name: boveda_personal
description: Gestor personal de finanzas offline para Android.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.44.4"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Estado e inyección de dependencias.
  flutter_riverpod: ">=3.0.0 <4.0.0"
  riverpod_annotation: ">=3.0.0 <4.0.0"

  # Navegación declarativa.
  go_router: ">=16.0.0 <18.0.0"

  # Persistencia local.
  sqflite: ">=2.4.0 <3.0.0"
  path: ^1.9.1
  path_provider: ">=2.1.5 <3.0.0"

  # Seguridad local y biometría.
  flutter_secure_storage: ">=9.2.4 <11.0.0"
  local_auth: ">=2.3.0 <4.0.0"
  cryptography: ">=2.7.0 <3.0.0"

  # Precisión monetaria.
  decimal: ">=3.2.0 <4.0.0"

  # Presentación.
  fl_chart: ">=1.0.0 <2.0.0"
  intl: ^0.20.2

  # Modelos, serialización y utilidades.
  freezed_annotation: ">=3.0.0 <4.0.0"
  json_annotation: ">=4.9.0 <5.0.0"
  uuid: ">=4.5.0 <5.0.0"
  package_info_plus: ">=8.3.0 <10.0.0"
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Generación de código.
  build_runner: ">=2.4.15 <3.0.0"
  riverpod_generator: ">=3.0.0 <4.0.0"
  freezed: ">=3.0.0 <4.0.0"
  json_serializable: ">=6.9.0 <7.0.0"

  # Análisis estático.
  flutter_lints: ">=5.0.0 <7.0.0"
  custom_lint: ">=0.7.0 <1.0.0"
  riverpod_lint: ">=3.0.0 <4.0.0"

  # Pruebas.
  mocktail: ">=1.0.4 <2.0.0"
  sqflite_common_ffi: ">=2.3.5 <3.0.0"
  golden_toolkit: ">=0.15.0 <1.0.0"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
